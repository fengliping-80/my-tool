<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据内容提取与拼接工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 25px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
        }

        .card-title {
            font-size: 1.5rem;
            color: #4a5568;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
            display: flex;
            align-items: center;
        }

        .card-title i {
            margin-right: 10px;
            color: #667eea;
        }

        .textarea-container {
            position: relative;
            margin-bottom: 15px;
        }

        .textarea-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #4a5568;
        }

        .input-textarea, .output-textarea {
            width: 100%;
            min-height: 300px;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: vertical;
            transition: border-color 0.3s;
        }

        .input-textarea:focus, .output-textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .output-textarea {
            background-color: #f7fafc;
            cursor: default;
        }

        .textarea-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #718096;
            margin-top: 5px;
        }

        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            gap: 20px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 15px;
            background: #f7fafc;
            border-radius: 8px;
            min-width: 100px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #718096;
        }

        .error-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 15px;
            background: #fff5f5;
            border-radius: 8px;
            min-width: 100px;
        }

        .error-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #e53e3e;
        }

        .error-label {
            font-size: 0.85rem;
            color: #c53030;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #4a5568;
        }

        .btn-secondary:hover {
            background: #cbd5e0;
        }

        .btn-success {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(72, 187, 120, 0.4);
        }

        .btn-icon {
            font-size: 1.1rem;
        }

        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 20px;
            background: #38a169;
            color: white;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 1000;
        }

        .notification.error {
            background: #e53e3e;
        }

        .notification.warning {
            background: #d69e2e;
        }

        .notification.info {
            background: #4299e1;
        }

        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 30px;
            font-size: 0.9rem;
        }

        .footer a {
            color: white;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading .spinner {
            display: inline-block;
        }

        .file-upload {
            position: relative;
            overflow: hidden;
        }

        .file-upload input {
            position: absolute;
            font-size: 100px;
            right: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        .details-panel {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 20px;
            margin-top: 20px;
        }

        .details-title {
            font-size: 1.2rem;
            color: #4a5568;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .details-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .detail-item {
            padding: 10px;
            background: #f7fafc;
            border-radius: 8px;
        }

        .detail-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #4a5568;
        }

        .detail-label {
            font-size: 0.85rem;
            color: #718096;
        }

        .filter-options {
            margin-top: 20px;
            padding: 15px;
            background: #f7fafc;
            border-radius: 8px;
        }

        .filter-title {
            font-weight: 600;
            margin-bottom: 10px;
            color: #4a5568;
        }

        .filter-group {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .error-list {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }

        .error-list-title {
            font-weight: 600;
            margin-bottom: 10px;
            color: #e53e3e;
        }

        .error-item-row {
            display: flex;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .error-line {
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 12px;
            color: #718096;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-code"></i> 数据内容提取与拼接工具</h1>
            <p>从JSON格式数据中提取content字段并拼接成完整字符串</p>
        </div>

        <div class="control-panel">
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-value" id="lineCount">0</span>
                    <span class="stat-label">总行数</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="contentCount">0</span>
                    <span class="stat-label">有效行</span>
                </div>
                <div class="error-item">
                    <span class="error-value" id="errorCount">0</span>
                    <span class="error-label">错误行</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="charCount">0</span>
                    <span class="stat-label">总字符</span>
                </div>
            </div>

            <div class="button-group">
                <button class="btn btn-secondary" id="loadExampleBtn">
                    <i class="fas fa-file-alt btn-icon"></i> 加载示例
                </button>
                <label class="btn btn-secondary file-upload">
                    <i class="fas fa-folder-open btn-icon"></i> 打开文件
                    <input type="file" id="fileInput" accept=".txt,.json">
                </label>
                <button class="btn btn-primary" id="processBtn">
                    <i class="fas fa-play btn-icon"></i> 提取并拼接
                    <div class="spinner"></div>
                </button>
            </div>
        </div>

        <div class="filter-options">
            <div class="filter-title">处理选项：</div>
            <div class="filter-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="skipEmptyContent" checked>
                    跳过空的content字段
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="skipMissingContent" checked>
                    跳过没有content字段的行
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="showErrorDetails">
                    显示错误详情
                </label>
            </div>
        </div>

        <div class="main-content">
            <div class="card">
                <h2 class="card-title"><i class="fas fa-keyboard"></i> 输入数据</h2>
                <div class="textarea-container">
                    <label class="textarea-label" for="inputData">请输入或粘贴数据 (每行格式: data: {"content": "..."})</label>
                    <textarea class="input-textarea" id="inputData" placeholder="将您的数据粘贴在这里..."></textarea>
                    <div class="textarea-info">
                        <span>提示: 支持多行数据，每行应为有效的JSON格式</span>
                        <span id="inputLines">0 行</span>
                    </div>
                </div>
                <div class="button-group">
                    <button class="btn btn-secondary" id="clearInputBtn">
                        <i class="fas fa-trash-alt btn-icon"></i> 清空输入
                    </button>
                </div>
            </div>

            <div class="card">
                <h2 class="card-title"><i class="fas fa-file-code"></i> 提取结果</h2>
                <div class="textarea-container">
                    <label class="textarea-label" for="outputData">拼接后的完整内容</label>
                    <textarea class="output-textarea" id="outputData" readonly placeholder="处理结果将显示在这里..."></textarea>
                    <div class="textarea-info">
                        <span>处理完成的结果将显示在此处</span>
                        <span id="outputChars">0 字符</span>
                    </div>
                </div>
                <div class="button-group">
                    <button class="btn btn-secondary" id="copyBtn">
                        <i class="fas fa-copy btn-icon"></i> 复制结果
                    </button>
                    <button class="btn btn-success" id="saveBtn">
                        <i class="fas fa-save btn-icon"></i> 保存结果
                    </button>
                </div>
            </div>
        </div>

        <div class="details-panel" id="detailsPanel" style="display: none;">
            <h3 class="details-title"><i class="fas fa-info-circle"></i> 处理详情</h3>
            <div class="details-content">
                <div class="detail-item">
                    <div class="detail-value" id="detailTotalLines">0</div>
                    <div class="detail-label">总行数</div>
                </div>
                <div class="detail-item">
                    <div class="detail-value" id="detailValidLines">0</div>
                    <div class="detail-label">有效行数</div>
                </div>
                <div class="detail-item">
                    <div class="detail-value" id="detailEmptyLines">0</div>
                    <div class="detail-label">空行数</div>
                </div>
                <div class="detail-item">
                    <div class="detail-value" id="detailMissingContent">0</div>
                    <div class="detail-label">无content行数</div>
                </div>
                <div class="detail-item">
                    <div class="detail-value" id="detailJsonErrors">0</div>
                    <div class="detail-label">JSON错误行数</div>
                </div>
                <div class="detail-item">
                    <div class="detail-value" id="detailOtherErrors">0</div>
                    <div class="detail-label">其他错误行数</div>
                </div>
            </div>

            <div class="error-list" id="errorList" style="display: none;">
                <div class="error-list-title"><i class="fas fa-exclamation-triangle"></i> 错误详情：</div>
                <div id="errorListContent"></div>
            </div>
        </div>

        <div class="footer">
            <p>数据内容提取与拼接工具 © 2023 | 支持格式: JSON行数据 | 无需安装，直接在浏览器中使用</p>
            <p>提示: 您可以保存此页面到本地，离线使用</p>
        </div>

        <div class="notification" id="notification">
            <i class="fas fa-check-circle"></i>
            <span id="notificationText">操作成功！</span>
        </div>
    </div>

    <script>
        // 示例数据（包含各种测试情况）
        const exampleData = `# 示例数据，包含各种情况
# 正常情况
data: {"log_uuid":"a336ef3e-5430-4522-8399-980d0bf9793d","index":221,"name":"gse","finish_reason":"","content":"奥迪","ext":{}}

data: {"log_uuid":"a336ef3e-5430-4522-8399-980d0bf9793d","index":222,"name":"gse","finish_reason":"","content":"A4","ext":{}}

# 空的content字段
data: {"log_uuid":"a336ef3e-5430-4522-8399-980d0bf9793d","index":223,"name":"gse","finish_reason":"","content":"","ext":{}}

# 没有content字段
data: {"log_uuid":"a336ef3e-5430-4522-8399-980d0bf9793d","index":224,"name":"gse","finish_reason":"","ext":{}}

# 格式错误的JSON
data: {"log_uuid":"a336ef3e-5430-4522-8399-980d0bf9793d","index":225,"name":"gse","finish_reason":"","content":"测试",,,"ext":{}}

# 正常情况
data: {"log_uuid":"a336ef3e-5430-4522-8399-980d0bf9793d","index":226,"name":"gse","finish_reason":"","content":"是一款","ext":{}}

data: {"log_uuid":"a336ef3e-5430-4522-8399-980d0bf9793d","index":227,"name":"gse","finish_reason":"","content":"豪华轿车","ext":{}}

# 空行


# 非JSON行
这是一行普通文本，不是JSON格式

# 正常情况
data: {"log_uuid":"a336ef3e-5430-4522-8399-980d0bf9793d","index":228,"name":"gse","finish_reason":"","content":"。","ext":{}}`;

        // DOM元素
        const inputDataEl = document.getElementById('inputData');
        const outputDataEl = document.getElementById('outputData');
        const processBtn = document.getElementById('processBtn');
        const loadExampleBtn = document.getElementById('loadExampleBtn');
        const clearInputBtn = document.getElementById('clearInputBtn');
        const copyBtn = document.getElementById('copyBtn');
        const saveBtn = document.getElementById('saveBtn');
        const fileInput = document.getElementById('fileInput');
        const notification = document.getElementById('notification');
        const notificationText = document.getElementById('notificationText');

        // 过滤选项
        const skipEmptyContentEl = document.getElementById('skipEmptyContent');
        const skipMissingContentEl = document.getElementById('skipMissingContent');
        const showErrorDetailsEl = document.getElementById('showErrorDetails');

        // 统计元素
        const lineCountEl = document.getElementById('lineCount');
        const contentCountEl = document.getElementById('contentCount');
        const errorCountEl = document.getElementById('errorCount');
        const charCountEl = document.getElementById('charCount');
        const inputLinesEl = document.getElementById('inputLines');
        const outputCharsEl = document.getElementById('outputChars');

        // 详情面板元素
        const detailsPanel = document.getElementById('detailsPanel');
        const detailTotalLinesEl = document.getElementById('detailTotalLines');
        const detailValidLinesEl = document.getElementById('detailValidLines');
        const detailEmptyLinesEl = document.getElementById('detailEmptyLines');
        const detailMissingContentEl = document.getElementById('detailMissingContent');
        const detailJsonErrorsEl = document.getElementById('detailJsonErrors');
        const detailOtherErrorsEl = document.getElementById('detailOtherErrors');
        const errorList = document.getElementById('errorList');
        const errorListContent = document.getElementById('errorListContent');

        // 处理统计
        let processingStats = {
            totalLines: 0,
            validLines: 0,
            emptyLines: 0,
            missingContent: 0,
            jsonErrors: 0,
            otherErrors: 0,
            errorDetails: []
        };

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 加载示例数据
            loadExampleData();

            // 绑定事件
            bindEvents();

            // 监听输入变化
            inputDataEl.addEventListener('input', updateInputStats);

            // 监听错误详情选项变化
            showErrorDetailsEl.addEventListener('change', function() {
                if (this.checked && processingStats.errorDetails.length > 0) {
                    displayErrorDetails();
                } else {
                    errorList.style.display = 'none';
                }
            });
        });

        // 绑定事件
        function bindEvents() {
            processBtn.addEventListener('click', processContent);
            loadExampleBtn.addEventListener('click', loadExampleData);
            clearInputBtn.addEventListener('click', clearInput);
            copyBtn.addEventListener('click', copyOutput);
            saveBtn.addEventListener('click', saveOutput);
            fileInput.addEventListener('change', handleFileSelect);
        }

        // 从文本中提取content字段并拼接
        function extractContentFromText(text) {
            const contentList = [];

            // 重置处理统计
            resetProcessingStats();

            const lines = text.split('\n');
            const skipEmpty = skipEmptyContentEl.checked;
            const skipMissing = skipMissingContentEl.checked;

            for (let i = 0; i < lines.length; i++) {
                const originalLine = lines[i];
                const line = originalLine.trim();

                processingStats.totalLines++;

                // 处理空行
                if (!line) {
                    processingStats.emptyLines++;
                    continue;
                }

                // 跳过注释行（以#开头）
                if (line.startsWith('#')) {
                    continue;
                }

                // 每行数据以 "data: " 开头，后面是JSON字符串
                let jsonStr = line;
                if (line.startsWith('data: ')) {
                    jsonStr = line.substring(6);
                }

                try {
                    const dataObj = JSON.parse(jsonStr);

                    // 检查content字段是否存在
                    if (!dataObj.hasOwnProperty('content')) {
                        processingStats.missingContent++;

                        if (skipMissing) {
                            processingStats.errorDetails.push({
                                lineNumber: i + 1,
                                errorType: 'missing_content',
                                linePreview: originalLine.substring(0, 50) + (originalLine.length > 50 ? '...' : '')
                            });
                            continue;
                        } else {
                            // 如果不跳过，添加空字符串
                            contentList.push('');
                            processingStats.validLines++;
                        }
                    } else {
                        const contentValue = dataObj.content;

                        // 检查content字段是否为空
                        if (contentValue === '' || contentValue === null || contentValue === undefined) {
                            processingStats.missingContent++; // 这里记录为缺少实际内容

                            if (skipEmpty) {
                                processingStats.errorDetails.push({
                                    lineNumber: i + 1,
                                    errorType: 'empty_content',
                                    linePreview: originalLine.substring(0, 50) + (originalLine.length > 50 ? '...' : '')
                                });
                                continue;
                            } else {
                                // 如果不跳过，添加空字符串
                                contentList.push('');
                                processingStats.validLines++;
                            }
                        } else {
                            // 有效的content字段
                            contentList.push(contentValue);
                            processingStats.validLines++;
                        }
                    }
                } catch (error) {
                    // JSON解析错误
                    processingStats.jsonErrors++;
                    processingStats.errorDetails.push({
                        lineNumber: i + 1,
                        errorType: 'json_parse_error',
                        errorMessage: error.message,
                        linePreview: originalLine.substring(0, 50) + (originalLine.length > 50 ? '...' : '')
                    });
                    continue;
                }
            }

            // 将列表中的所有字符串连接成一个完整的字符串
            const resultString = contentList.join('');
            const resultLength = resultString.length;

            return {
                result: resultString,
                resultLength
            };
        }

        // 处理内容
        function processContent() {
            const inputData = inputDataEl.value.trim();

            if (!inputData) {
                showNotification('请输入要处理的数据！', 'warning');
                return;
            }

            // 显示加载状态
            processBtn.classList.add('loading');

            // 使用setTimeout模拟异步处理，避免阻塞UI
            setTimeout(() => {
                try {
                    const { result, resultLength } = extractContentFromText(inputData);

                    // 更新输出
                    outputDataEl.value = result;

                    // 更新统计信息
                    updateStats();

                    // 显示详情面板
                    displayProcessingDetails();

                    if (resultLength > 0) {
                        showNotification(`处理完成！从 ${processingStats.validLines} 个有效行中提取了 ${resultLength} 个字符。`, 'info');
                    } else if (processingStats.validLines > 0) {
                        showNotification('处理完成！但没有提取到任何内容（所有content字段都为空）。', 'warning');
                    } else {
                        showNotification('处理完成！但未找到任何有效数据。', 'warning');
                    }
                } catch (error) {
                    console.error('处理错误:', error);
                    showNotification(`处理数据时发生错误: ${error.message}`, 'error');
                } finally {
                    // 移除加载状态
                    processBtn.classList.remove('loading');
                }
            }, 300);
        }

        // 更新统计信息
        function updateStats() {
            lineCountEl.textContent = processingStats.totalLines;
            contentCountEl.textContent = processingStats.validLines;
            errorCountEl.textContent = processingStats.missingContent + processingStats.jsonErrors + processingStats.otherErrors;
            charCountEl.textContent = outputDataEl.value.length;
            outputCharsEl.textContent = `${outputDataEl.value.length} 字符`;
        }

        // 重置处理统计
        function resetProcessingStats() {
            processingStats = {
                totalLines: 0,
                validLines: 0,
                emptyLines: 0,
                missingContent: 0,
                jsonErrors: 0,
                otherErrors: 0,
                errorDetails: []
            };
        }

        // 显示处理详情
        function displayProcessingDetails() {
            detailTotalLinesEl.textContent = processingStats.totalLines;
            detailValidLinesEl.textContent = processingStats.validLines;
            detailEmptyLinesEl.textContent = processingStats.emptyLines;
            detailMissingContentEl.textContent = processingStats.missingContent;
            detailJsonErrorsEl.textContent = processingStats.jsonErrors;
            detailOtherErrorsEl.textContent = processingStats.otherErrors;

            detailsPanel.style.display = 'block';

            // 如果有错误详情且用户选择显示，则显示错误列表
            if (processingStats.errorDetails.length > 0 && showErrorDetailsEl.checked) {
                displayErrorDetails();
            } else {
                errorList.style.display = 'none';
            }
        }

        // 显示错误详情
        function displayErrorDetails() {
            errorListContent.innerHTML = '';

            processingStats.errorDetails.forEach(error => {
                const errorItem = document.createElement('div');
                errorItem.className = 'error-item-row';

                let errorText = `第 ${error.lineNumber} 行: `;

                switch (error.errorType) {
                    case 'missing_content':
                        errorText += '缺少content字段';
                        break;
                    case 'empty_content':
                        errorText += 'content字段为空';
                        break;
                    case 'json_parse_error':
                        errorText += `JSON解析错误: ${error.errorMessage}`;
                        break;
                    default:
                        errorText += '未知错误';
                }

                if (error.linePreview) {
                    errorText += ` (内容: "${error.linePreview}")`;
                }

                errorItem.innerHTML = `
                    <i class="fas fa-exclamation-circle" style="color: #e53e3e; margin-right: 8px;"></i>
                    <span class="error-line">${errorText}</span>
                `;

                errorListContent.appendChild(errorItem);
            });

            errorList.style.display = 'block';
        }

        // 加载示例数据
        function loadExampleData() {
            inputDataEl.value = exampleData;
            updateInputStats();
            showNotification('示例数据已加载！包含各种测试情况。', 'info');
        }

        // 清空输入
        function clearInput() {
            inputDataEl.value = '';
            outputDataEl.value = '';
            updateInputStats();
            resetStats();
            detailsPanel.style.display = 'none';
            showNotification('输入已清空！');
        }

        // 复制输出
        function copyOutput() {
            const output = outputDataEl.value;
            if (!output) {
                showNotification('没有可复制的内容！', 'warning');
                return;
            }

            navigator.clipboard.writeText(output)
                .then(() => {
                    showNotification('结果已复制到剪贴板！');
                })
                .catch(err => {
                    console.error('复制失败:', err);
                    showNotification('复制失败，请手动选择并复制！', 'error');
                });
        }

        // 保存输出
        function saveOutput() {
            const output = outputDataEl.value;
            if (!output) {
                showNotification('没有可保存的内容！', 'warning');
                return;
            }

            const blob = new Blob([output], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'extracted_content.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showNotification('结果已保存为文件！');
        }

        // 处理文件选择
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                inputDataEl.value = e.target.result;
                updateInputStats();
                showNotification(`已加载文件: ${file.name}`, 'info');
            };

            reader.onerror = function() {
                showNotification('读取文件时出错！', 'error');
            };

            reader.readAsText(file);

            // 重置文件输入，允许重复选择同一文件
            event.target.value = '';
        }

        // 更新输入统计
        function updateInputStats() {
            const lines = inputDataEl.value.split('\n').length;
            inputLinesEl.textContent = `${lines} 行`;
        }

        // 重置统计
        function resetStats() {
            lineCountEl.textContent = '0';
            contentCountEl.textContent = '0';
            errorCountEl.textContent = '0';
            charCountEl.textContent = '0';
            outputCharsEl.textContent = '0 字符';
        }

        // 显示通知
        function showNotification(message, type = 'success') {
            const icon = notification.querySelector('i');

            // 根据类型设置图标
            switch (type) {
                case 'error':
                    icon.className = 'fas fa-exclamation-circle';
                    break;
                case 'warning':
                    icon.className = 'fas fa-exclamation-triangle';
                    break;
                case 'info':
                    icon.className = 'fas fa-info-circle';
                    break;
                default:
                    icon.className = 'fas fa-check-circle';
            }

            notificationText.textContent = message;
            notification.className = 'notification';
            notification.classList.add(type);
            notification.style.display = 'flex';

            // 3秒后自动隐藏
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }

        // 添加键盘快捷键支持
        document.addEventListener('keydown', function(e) {
            // Ctrl+Enter 处理内容
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                processContent();
            }

            // Ctrl+L 加载示例
            if (e.ctrlKey && e.key === 'l') {
                e.preventDefault();
                loadExampleData();
            }

            // Ctrl+C 复制结果
            if (e.ctrlKey && e.key === 'c' && document.activeElement !== inputDataEl) {
                copyOutput();
            }
        });

        // 添加粘贴处理
        inputDataEl.addEventListener('paste', function(e) {
            // 延迟更新统计
            setTimeout(updateInputStats, 10);
        });
    </script>
</body>
</html>
